apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rust-axum-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # Jika pakai cert-manager untuk SSL:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
  - host: localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rust-axum-service
            port:
              number: 80
