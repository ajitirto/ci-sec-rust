name: Rust Axum Security CI

on:
  push:
    branches: [ "**" ]
    paths:
      - 'src/**'
      - '**/*.rs'    
      - 'Cargo.toml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - '**/*.rs'
      - 'Cargo.toml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan menjalankan build manual'
        required: false
        default: 'Manual trigger'
permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  quality:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # 1. Cek Formatting
      - name: Check Formatting
        run: cargo fmt --all -- --check

      # 2. Clippy (Linting) - Sangat penting untuk Axum/Tokio
      - name: Clippy Lint
        run: cargo clippy -- -D warnings

      # 3. Security Audit (Cek kerentanan di crates.io)
      - name: Security Audit
        uses: rustsec/audit-check@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: cargo test --release

  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Ganti 'ajitirto' dengan username Docker Hub Anda
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rust-axum-api:latest
